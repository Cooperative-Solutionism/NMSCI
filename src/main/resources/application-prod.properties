spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

nmsci.central-key-pair.pubkey=${CENTRAL_KEY_PAIR_PUBKEY}
nmsci.central-key-pair.prikey=${CENTRAL_KEY_PAIR_PRIKEY}

nmsci.register-difficulty-target-nbits=0x1f002708
nmsci.transaction-difficulty-target-nbits=0x20ffffff

# 出块开关（部署灰度用），经 env 注入，与 DB/中心密钥同一套机制。缺省 true 保持稳态出块；
# 升级时在 env 文件设 NMSCI_BLOCK_GENERATION_ENABLED=false 进入静默校验窗，校验通过后改回 true（或删除该行）并重启开始出块。
nmsci.block-generation-enabled=${NMSCI_BLOCK_GENERATION_ENABLED:true}
