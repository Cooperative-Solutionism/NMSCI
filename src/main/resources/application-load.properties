# NMSCI load-test profile. Start the app with -Dspring-boot.run.profiles=load.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nmsci_load}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Central key via env vars (do not commit a private key); values MUST equal TestKeyPairs.CENTRAL.
nmsci.central-key-pair.pubkey=${CENTRAL_KEY_PAIR_PUBKEY}
nmsci.central-key-pair.prikey=${CENTRAL_KEY_PAIR_PRIKEY}

# Trivial PoW so the load simulation mines a nonce in 1-2 iterations.
nmsci.register-difficulty-target-nbits=0x20ffffff
nmsci.transaction-difficulty-target-nbits=0x20ffffff

# Isolate generated block/dat files under temp/ (excluded from the source hash).
nmsci.file-root-dir=temp/load

# Larger pool to exercise DB concurrency under load.
spring.datasource.hikari.maximum-pool-size=20
